max_retry_count: 3
offline_mode: false
require_human_approval: true
default_model_provider: deepseek
demo_mode: true
save_reports: true
save_runs: true
runner_mode: python
code_agent:
  enabled: true
  allowed_paths:
    - src
    - output
    - docs
    - frontend-vue/src
    - backend-java/src
    - utils
    - services
    - config
    - workflow_templates
    - agent_registry
    - plugins
    - tests
  blocked_paths:
    - .git
    - .venv
    - node_modules
    - frontend-vue/node_modules
    - frontend-vue/dist
    - backend-java/target
    - runner-cpp/build
    - .env
  audit_log_path: output/code_agent_audit.jsonl
  max_read_chars: 200000
  allowed_workspace_roots: []
  blocked_patterns:
    - .env
    - .git/**
    - node_modules/**
    - frontend-vue/node_modules/**
    - frontend-vue/dist/**
    - backend-java/target/**
    - runner-cpp/build/**
  max_files_per_folder: 80
  max_total_read_chars: 500000
  max_file_size_bytes: 200000
  text_file_extensions:
    - .py
    - .ts
    - .tsx
    - .js
    - .jsx
    - .vue
    - .java
    - .md
    - .txt
    - .json
    - .yaml
    - .yml
    - .css
    - .html
  dry_run_default: true
  backup_before_write: true
